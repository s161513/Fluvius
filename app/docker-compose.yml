services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingest:
    profiles: ["ingest"]
    image: data-engineering:latest
    build:
      context: ../ingest
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ../ingest/data:/app/data:ro
    env_file:
      - ../ingest/.env
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    image: app-streamlit:latest
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ../ingest/data:/app/data:ro
      - ./dashboard.py:/app/dashboard.py:ro
    environment:
      - PARQUET_PATH=/app/data/1-19-totaal-gealloceerd-volume.parquet
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
